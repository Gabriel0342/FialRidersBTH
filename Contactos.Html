<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fial Riders - Contactos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body { margin: 0; color: white; min-height: 100vh; position: relative; overflow-x: hidden; width: 100%; }
        body::before {
            content: ""; position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(rgba(20, 25, 20, 0.85), rgba(15, 20, 15, 0.90)), url("./mainFundo.jpg") center/cover no-repeat;
        }
        [x-cloak] { display: none !important; }
        
        .map-container {
            mask: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23000"/></svg>') center / contain no-repeat;
            -webkit-mask: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23000"/></svg>') center / contain no-repeat;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #292524; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #166534; border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased text-stone-200">

<div x-data="globalManager()" x-init="init()" class="flex flex-col min-h-screen w-full">

    <header class="relative z-50 w-full">
      <nav aria-label="Global" class="flex items-center justify-between p-6 lg:px-8 max-w-7xl mx-auto">
        <div class="flex lg:flex-1"><a href="#" class="-m-1.5 p-1.5"><span class="sr-only">Fial Riders</span></a></div>
        <div class="flex lg:hidden">
          <button type="button" @click="mobileMenuOpen = true" class="-m-2.5 inline-flex items-center justify-center rounded-md p-2.5 text-stone-200 hover:text-green-500">
            <span class="sr-only">Menu</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="size-6"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" /></svg>
          </button>
        </div>
        <div class="hidden lg:flex lg:gap-x-5">
          <a href="./index.html" class="text-sm/6 font-semibold hover:text-green-500 transition-colors">Home</a>
          <a href="./QuemSomos.Html" class="text-sm/6 font-semibold hover:text-green-500 transition-colors">Quem Somos</a>
          <a href="./Camisolas.Html" class="text-sm/6 font-semibold hover:text-green-500 transition-colors">Merchandising</a>
          <a href="./Eventos.Html" class="text-sm/6 font-semibold hover:text-green-500 transition-colors">Eventos</a>
          <a href="./Contactos.Html" class="text-sm/6 font-semibold text-green-500">Contactos</a>
          <a href="./FotoEventos.Html" class="text-sm/6 font-semibold hover:text-green-500 transition-colors">Fotos dos Eventos</a>
        </div>
        <div class="flex flex-1 justify-end items-center gap-6">
            <button @click="cartOpen = true" class="relative group text-white hover:text-green-500 transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg>
                <span x-show="cart.length > 0" class="absolute -top-2 -right-2 bg-green-700 text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center border border-stone-900" x-text="cartTotalItems"></span>
            </button>
            <button @click="if(currentUser) logout(); else loginOpen = true" class="text-sm/6 font-semibold transition tracking-wide uppercase cursor-pointer" :class="currentUser ? 'text-green-500 hover:text-red-400' : 'text-stone-300 hover:text-green-500'" x-text="currentUser ? 'Olá, ' + currentUser.name + ' (Sair)' : 'LOGIN SÓCIO'"></button>
        </div>
      </nav>
      <div x-show="mobileMenuOpen" class="lg:hidden" role="dialog" aria-modal="true" x-cloak>
        <div class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm" @click="mobileMenuOpen = false"></div>
        <div class="fixed inset-y-0 left-0 z-50 w-full overflow-y-auto bg-stone-900 border-r border-stone-700 px-6 py-6 sm:max-w-sm">
            <div class="flex items-center justify-between">
                <a href="#" class="-m-1.5 p-1.5"><img src="./LogoMotar-removebg-preview.png" alt="" class="h-15 w-20 opacity-90" /></a>
                <button type="button" @click="mobileMenuOpen = false" class="-m-2.5 rounded-md p-2.5 text-stone-400 hover:text-white"><span class="sr-only">Fechar</span><svg class="size-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg></button>
            </div>
            <div class="mt-6 flow-root">
                <div class="-my-6 divide-y divide-stone-700">
                    <div class="space-y-2 py-6">
                        <a href="./index.html" class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold text-stone-300 hover:bg-stone-800 hover:text-green-500">Home</a>
                        <a href="./QuemSomos.Html" class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold text-stone-300 hover:bg-stone-800 hover:text-green-500">Quem Somos</a>
                        <a href="./Camisolas.Html" class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold text-stone-300 hover:bg-stone-800 hover:text-green-500">Merchandising</a>
                        <a href="./Eventos.Html" class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold text-stone-300 hover:bg-stone-800 hover:text-green-500">Eventos</a>
                        <a href="./Contactos.Html" class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold text-green-500 bg-stone-800">Contactos</a>
                        <a href="./FotoEventos.Html" class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold text-stone-300 hover:bg-stone-800 hover:text-green-500">Fotos dos Eventos</a>
                        <button @click="if(currentUser) logout(); else { mobileMenuOpen = false; loginOpen = true; }" class="-mx-3 block w-full text-left rounded-lg px-3 py-2 text-base font-semibold uppercase tracking-widest" :class="currentUser ? 'text-red-400' : 'text-stone-300'"><span x-text="currentUser ? 'Sair (' + currentUser.name + ')' : 'Login Sócio'"></span></button>
                    </div>
                </div>
            </div>
        </div>
      </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-12">
        <div class="flex flex-col lg:flex-row items-center justify-between gap-12">
            <div class="w-full lg:w-1/2">
                <h2 class="text-4xl md:text-7xl font-bold mb-8 text-white uppercase tracking-widest drop-shadow-md">
                    Contacta-nos!
                </h2>
                <form class="space-y-4" @submit.prevent="sendContact">
                    <div>
                        <input type="text" x-model="contactForm.name" placeholder='Nome Completo' required class="p-4 w-full bg-stone-800 border border-stone-600 rounded-sm text-stone-100 placeholder-stone-500 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 transition-colors" />
                    </div>
                    <div>
                        <input type="email" x-model="contactForm.email" placeholder='Email' required class="p-4 w-full bg-stone-800 border border-stone-600 rounded-sm text-stone-100 placeholder-stone-500 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 transition-colors" />
                    </div>
                    <div>
                        <textarea x-model="contactForm.message" placeholder='Mensagem' required class="p-4 w-full bg-stone-800 border border-stone-600 rounded-sm text-stone-100 placeholder-stone-500 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 transition-colors" rows="4"></textarea>
                    </div>
                    <button type="submit" :disabled="isSending" class="w-full sm:w-auto rounded-sm px-12 py-4 bg-green-800 text-white font-bold uppercase tracking-widest hover:bg-green-700 border border-green-900 shadow-lg transition-all active:scale-[0.98]">
                        <span x-show="!isSending">Enviar</span>
                        <span x-show="isSending" class="animate-pulse">A enviar...</span>
                    </button>
                    
                    <div class="mt-6 flex gap-4">
                        <a href="https://www.instagram.com/fialriders.bthd/" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center w-10 h-10 rounded-full border border-stone-600 text-stone-400 hover:bg-green-800 hover:border-green-700 hover:text-white transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-5 h-5" fill="currentColor"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5A4.25 4.25 0 0 0 20.5 16.25v-8.5A4.25 4.25 0 0 0 16.25 3.5zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.5A3.5 3.5 0 1 0 12 15a3.5 3.5 0 0 0 0-7zm5.25-.88a.88.88 0 1 1-1.76 0 .88.88 0 0 1 1.76 0z"/></svg>
                        </a>
                        <a href="https://www.facebook.com/share/1BAbg3hMEa/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center w-10 h-10 rounded-full border border-stone-600 text-stone-400 hover:bg-green-800 hover:border-green-700 hover:text-white transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-7 h-7" fill="currentColor"><path d="M13.5 9H15.75V6.75H13.5C11.9812 6.75 10.75 7.98122 10.75 9.5V11H8.5V13.25H10.75V18H13V13.25H15.1313L15.75 11H13V9.5C13 9.22386 13.2239 9 13.5 9Z" /></svg>
                        </a>
                    </div>
                </form>
            </div>

            <div class="w-full lg:w-1/2 flex justify-center">
                <div class="relative w-72 h-72 sm:w-96 sm:h-96 md:w-[500px] md:h-[500px] rounded-full overflow-hidden map-container drop-shadow-2xl border-4 border-stone-800/50">
                    <iframe class="absolute inset-0 w-full h-full grayscale contrast-125 opacity-90 hover:grayscale-0 hover:opacity-100 transition-all duration-700" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3113.284713757434!2d-9.1393366!3d38.71667!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd19338fd3d1e16b%3A0x2bf3381a3d9d300e!2sLisboa!5e0!3m2!1spt-PT!2spt!4v1710000000000" style="border:0;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-6 text-center text-sm text-stone-400 bg-stone-900/90 backdrop-blur-sm border-t border-stone-800 w-full"> 
        © 2026 Fial Riders. Todos os direitos reservados.
    </footer>
</div>

<script>
  const API_BASE_URL = "https://2xeprvu0zh.execute-api.eu-north-1.amazonaws.com/default/api";

    function globalManager() {
        return {
            mobileMenuOpen: false, cartOpen: false, loginOpen: false, loginLoading: false, loginStep: 1, 
            tempEmail: '', isSending: false,
            contactForm: { name: '', email: '', message: '' },
            cart: JSON.parse(localStorage.getItem('fialCart')) || [],
            currentUser: JSON.parse(localStorage.getItem('fialCurrentUser')) || null,

            init() {
                if(this.currentUser) {
                    this.contactForm.name = this.currentUser.name || '';
                    this.contactForm.email = this.currentUser.email || '';
                }
            },

            async iniciarLogin(numero, email) {
            if(!numero || !email) return;
            this.loginLoading = true;
            try {
                const res = await fetch(`${API_BASE_URL}/pedir-codigo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ numero, email })
                });
                const data = await res.json();
                if (data.sucesso) {
                    this.tempEmail = email;
                    this.loginStep = 2; 
                } else { alert(data.erro || "Sócio não encontrado."); }
            } catch (e) { alert("Erro de rede."); } 
            finally { this.loginLoading = false; }
        },

            async verificarCodigo(codigoInserido) {
                try {
                    const response = await fetch(`${API_BASE_URL}/verificar-codigo`, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: this.tempEmail, codigo: codigoInserido })
                    });

                    const data = await response.json();

                    if (data.valid || data.sucesso) {
                        localStorage.setItem('fialAuthToken', data.token || 'token_dummy');
                        localStorage.setItem('fialCurrentUser', JSON.stringify({ name: data.nome || 'Sócio', email: this.tempEmail }));
                        
                        this.currentUser = { name: data.nome || 'Sócio', email: this.tempEmail };
                        this.loginOpen = false;
                        window.location.reload();
                    } else { 
                        alert(data.erro || "Código inválido ou expirado."); 
                    }
                } catch (e) {
                    alert("Erro ao validar o código.");
                }
            },

            logout() { 
                localStorage.removeItem('fialCurrentUser'); 
                localStorage.removeItem('fialAuthToken'); 
                window.location.reload(); 
            },

            async sendContact() {
                if (!this.contactForm.name || !this.contactForm.email || !this.contactForm.message) { 
                    alert("Preenche todos os campos."); return; 
                }
                this.isSending = true;
                try {
                    const response = await fetch(`${API_BASE_URL}/contacto`, {
                        method: "POST",
                        mode: 'cors',
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            nome: this.contactForm.name, 
                            email: this.contactForm.email, 
                            mensagem: this.contactForm.message 
                        })
                    });
                    const data = await response.json();
                    if (data.sucesso) {
                        alert("Mensagem enviada!");
                        this.contactForm.message = ''; 
                    } else { alert("Erro ao enviar."); }
                } catch (error) { alert("Erro de ligação."); }
                finally { this.isSending = false; }
            },

            get cartTotalItems() { return this.cart.reduce((total, item) => total + item.quantity, 0); },
            get cartTotal() { return this.formatPrice(this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0)); },
            removeFromCart(index) { this.cart.splice(index, 1); localStorage.setItem('fialCart', JSON.stringify(this.cart)); },
            formatPrice(value) { return new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR' }).format(value); }
        }
    }
</script>
</body>
</html>
